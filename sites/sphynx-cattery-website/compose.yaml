# Deploy wrapper for sphynx-cattery-website (PHP/MySQL).
# App code is the clone in ./app (gitignored; `git -C app pull` to update).
# Runtime config lives in site.env / db.env (gitignored).
services:
  sphynx-site:
    build:
      context: .
      dockerfile: site.Dockerfile
    container_name: sphynx-site
    restart: unless-stopped
    env_file: site.env
    depends_on:
      - sphynx-db
    networks:
      - edge
      - backend

  sphynx-db:
    image: mariadb:11
    container_name: sphynx-db
    restart: unless-stopped
    env_file: db.env
    volumes:
      - sphynx_db_data:/var/lib/mysql
      - ./app/site/database.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    networks:
      - backend

  # Free Cloudflare quick tunnel: new random https://*.trycloudflare.com URL each start.
  # bin/publish-site-url.sh grabs the URL and writes it to the site repo README.
  sphynx-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: sphynx-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate --url http://sphynx-site:80
    depends_on:
      - sphynx-site
    networks:
      - edge

volumes:
  sphynx_db_data:

networks:
  edge:
    external: true
    name: homelab_edge
  backend:
    name: sphynx_backend
